<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cinematic Vision | LumNeo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 3D 容器 -->
    <div id="canvas-container"></div>

    <!-- UI 覆盖层 -->
    <div class="overlay">
        <header>
            <div class="logo">
                <h1>LUM<span class="accent">NEO</span></h1>
                <span class="subtitle">Next-Gen Artificial Intelligence</span>
            </div>
            <nav>
                <a href="#" class="active">首页</a>
                <a href="#">技术</a>
                <a href="#">愿景</a>
                <a href="#">联系</a>
            </nav>
        </header>

        <main>
            <div class="hero-text">
                <h2 class="glitch" data-text="重塑认知边界">重塑认知边界</h2>
                <p>连接数据与思维的桥梁。探索深度神经网络背后的无限可能。</p>
                <div class="cta-group">
                    <button class="btn primary">开始探索</button>
                    <button class="btn secondary">了解更多</button>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 LumNeo AI Labs. All Systems Operational.</p>
        </footer>
    </div>

    <!-- 引入 Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script type="module" src="app.js"></script>

</html>
